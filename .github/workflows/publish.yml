name: Publish to PyPI

on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract current-version CHANGELOG section
        id: changelog
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # Extract the block between "## [<TAG>]" (inclusive) and the next "## [" line (exclusive).
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" { in_block=1; print; next }
            in_block && /^## \[/    { exit }
            in_block                { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG block found for $TAG; falling back to autogen only." >&2
            echo "_See commit log below._" > RELEASE_NOTES.md
          fi
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
          body_path: RELEASE_NOTES.md
